<!DOCTYPE html>
<html>
<head>
    <title>Register Patient</title>
    <style>
        /* Body with hospital background */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: url('https://images.unsplash.com/photo-1588776814546-503e345edaa6?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Overlay for better readability */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 123, 255, 0.4); /* semi-transparent blue overlay */
            z-index: 0;
        }

        /* Form container */
        .form-container {
            position: relative;
            z-index: 1;
            background: white;
            padding: 40px 50px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 400px;
            max-width: 90%;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #007BFF;
        }

        input[type="text"], input[type="number"], input[type="file"] {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0 20px 0;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:hover {
            background-color: #0056b3;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .back-button {
            background-color: #6c757d;
            margin-top: 20px;
        }

        .back-button:hover {
            background-color: #495057;
        }

        @media (max-width: 500px) {
            .form-container {
                padding: 30px 20px;
                width: 90%;
            }

            input[type="text"], input[type="number"], input[type="file"] {
                font-size: 14px;
            }

            button {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Register Patient</h2>

    <input type="text" id="name" placeholder="Full Name">
    <input type="number" id="age" placeholder="Age">
    <input type="text" id="gender" placeholder="Gender">
    <input type="file" id="photo" accept="image/*">
    <input type="text" id="fingerprintID" placeholder="Fingerprint ID" readonly>

    <button onclick="generateFingerprint()">Generate Fingerprint ID</button>
    <button onclick="registerPatient()">Register Patient</button>
    <button class="back-button" onclick="location.href='index.html'">Back to Dashboard</button>
</div>

<script>
    // Example: generate fingerprint
    function generateFingerprint() {
        document.getElementById('fingerprintID').value = "FP" + Math.floor(Math.random()*10000);
        alert("Fingerprint ID generated!");
    }

    // Example: register patient
    function registerPatient() {
        const name = document.getElementById("name").value.trim();
        const age = document.getElementById("age").value.trim();
        const gender = document.getElementById("gender").value.trim();
        const fingerprintID = document.getElementById("fingerprintID").value.trim();
        const photoInput = document.getElementById("photo");

        if(!name || !age || !gender || !fingerprintID || !photoInput.files.length){
            return alert("Please fill all fields and upload a photo.");
        }

        const reader = new FileReader();
        reader.onload = function() {
            const photoData = reader.result;

            let patients = JSON.parse(localStorage.getItem("patients") || "[]");

            patients.push({
                name, age, gender, fingerprintID, photo: photoData
            });

            localStorage.setItem("patients", JSON.stringify(patients));

            alert("Patient registered successfully!");
            location.reload();
        }

        reader.readAsDataURL(photoInput.files[0]);
    }
</script>

</body>
</html>
