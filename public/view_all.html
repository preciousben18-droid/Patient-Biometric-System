<!DOCTYPE html>
<html>
<head>
    <title>All Patients Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f4f8;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #1a3e59;
            margin-bottom: 40px;
        }

        .card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
        }

        .patient-card {
            background: white;
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .patient-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.25);
        }

        .patient-photo {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid #ddd;
        }

        .patient-info {
            padding: 20px;
        }

        .patient-info h3 {
            margin: 0 0 10px;
            color: #007BFF;
        }

        .patient-info p {
            margin: 5px 0;
            color: #333;
        }

        .back-button {
            display: block;
            margin: 40px auto 20px auto;
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .back-button:hover {
            background-color: #0056b3;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

<h1>All Registered Patients</h1>

<div class="card-container" id="patientsContainer">
    <!-- Patient cards will be generated here -->
</div>

<button class="back-button" onclick="location.href='index.html'">Back to Dashboard</button>

<script>
function loadPatients() {
    const patients = JSON.parse(localStorage.getItem("patients") || "[]");
    const container = document.getElementById("patientsContainer");
    container.innerHTML = "";

    if (patients.length === 0) {
        container.innerHTML = "<p style='text-align:center; color:red;'>No patients registered.</p>";
        return;
    }

    patients.forEach(p => {
        const card = document.createElement("div");
        card.className = "patient-card";
        card.innerHTML = `
            <img class="patient-photo" src="${p.photo}" alt="Patient Photo">
            <div class="patient-info">
                <h3>${p.name}</h3>
                <p><strong>Age:</strong> ${p.age}</p>
                <p><strong>Gender:</strong> ${p.gender}</p>
                <p><strong>Fingerprint ID:</strong> ${p.fingerprintID}</p>
                <h4>Medical History:</h4>
                <p><strong>Allergies:</strong> ${p.medicalHistory?.allergies || "N/A"}</p>
                <p><strong>Conditions:</strong> ${p.medicalHistory?.conditions || "N/A"}</p>
                <p><strong>Medication:</strong> ${p.medicalHistory?.medication || "N/A"}</p>
                <p><strong>Blood Group:</strong> ${p.medicalHistory?.blood || "N/A"}</p>
            </div>
        `;
        container.appendChild(card);
    });
}

// Load patient cards on page load
window.onload = loadPatients;
</script>

</body>
</html>
