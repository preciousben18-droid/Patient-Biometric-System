<!DOCTYPE html>
<html>
<head>
    <script>
if (!localStorage.getItem("token")) {
    window.location.href = "admin.html";
}
</script>
    <title>Hospital System Dashboard</title>
    <style>
        /* Body with hospital background */
        body
        {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            background: url('https://images.unsplash.com/photo-1588776814546-503e345edaa6?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Overlay for better text readability */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 123, 255, 0.4); /* semi-transparent blue overlay */
            z-index: 0;
        }

        /* Page content */
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            color: white;
        }

        h1 {
            margin-bottom: 50px;
            font-size: 48px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        .btn-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .home-button {
            padding: 50px 70px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background-color: rgba(255, 255, 255, 0.9);
            color: #007BFF;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

        .home-button:hover {
            background-color: white;
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.35);
        }

        @media (max-width: 800px) {
            .btn-container {
                flex-direction: column;
                gap: 30px;
            }
            .home-button {
                width: 250px;
                padding: 30px 0;
            }
        }
    </style>
</head>
<body>
     <button onclick="logout()">Logout</button>
    <div class="content">
        <h1>CSC 811 GROUP 2 Hospital System Dashboard</h1>

        <div class="btn-container">
            <button class="home-button" onclick="location.href='register.html'">Register Patient</button>
            <button class="home-button" onclick="location.href='identify.html'">Identify Patient</button>
            <button class="home-button" onclick="location.href='view_all.html'">View All Patients</button>
        </div>
    </div>
    <script>
function logout() {
    localStorage.removeItem("token");
    window.location.href = "admin.html";
}
</script>
</body>
</html>
